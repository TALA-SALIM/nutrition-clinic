<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="singup_personal.css">
</head>
<body>
        <div class="head">
            
                <label for="black" id="black1">dark mode</label>
                <input  type="checkbox" class="black">
           <h1 id="welcome">Create your account</h1>
        </div>

    <div class="form">
        <form action="">
            <h1 id="personal">Personal information</h1>
            <label for="name">Full name:</label>
            <input type="text" id="name" placeholder="full name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="password" required>
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" placeholder="confirm password" required>
           
            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" placeholder="phone number">
           <label for="gender">Gender:</label>
            <select lang="gender"  title="gender " id="gender" required>
                <option value="male">male</option>
                <option value="female">female</option>
                <option value="other">other</option>    
            </select>
            
            <button type="submit" id="next">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/></svg> <p>next </p></button>
        </form>
    </div>
</body>
</html>
